<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Happy Birthday Akshu ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Poppins,sans-serif;
background:#090909;
color:#fff;
overflow-x:hidden;
}

section{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
padding:40px;
text-align:center;
}

h1{
font-family:"Great Vibes",cursive;
font-size:75px;
color:#ff4d88;
}

h2{
font-size:34px;
margin-top:20px;
}

p{
margin-top:25px;
max-width:700px;
font-size:20px;
line-height:2;
}

button{
margin-top:40px;
padding:18px 45px;
border:none;
border-radius:40px;
font-size:20px;
cursor:pointer;
background:#ff4d88;
color:white;
transition:.4s;
}

button:hover{
transform:scale(1.08);
}

.heart{
position:fixed;
color:#ff4d88;
animation:fall 7s linear infinite;
}

@keyframes fall{

0%{
transform:translateY(-100px);
opacity:1;
}

100%{
transform:translateY(110vh);
opacity:0;
}

}

  .gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:50px;
}

.gallery img{
width:100%;
border-radius:20px;
box-shadow:0 0 20px rgba(255,77,136,.4);
transition:.4s;
}

.gallery img:hover{
transform:scale(1.05);
}

.final{
display:none;
min-height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
background:linear-gradient(135deg,#ff0066,#8a2be2);
}

.final h1{
font-size:65px;
font-family:'Great Vibes',cursive;
}

.final p{
font-size:24px;
margin-top:20px;
}
  
</style>

</head>

<body>

<section id="home">

<h1>Happy Birthday ❤️</h1>

<h2>My Dearest Akshu</h2>

<p>

Every line of this website is written with love...

Only for You.

❤️

</p>

<button onclick="next()">

Start Surprise 🎁

</button>

</section>

<section id="letter" style="display:none">

<h1>Dear Akshu 💌</h1>

<p id="typing"></p>

<button onclick="song()">

🎵 Play Our Song

</button>

</section>
<section class="final" id="final" style="display:none;">

<h1>Happy Birthday Akshu ❤️</h1>

<p>
No matter what happens...<br><br>

You'll always be my favourite person. ❤️<br><br>

Love,<br>
<b>Omu ❤️</b>

</p>

<br>

<button onclick="location.reload()">
Start Again ❤️
</button>

</section>
  
<script>

let text=`Dear Akshu,

Happy Birthday ❤️

Today is not just your birthday...

Today is the day my favourite person came into this world.

Thank you for making my life beautiful.

May you always smile.

May every dream of yours come true.

You deserve all the happiness in this world.

Love,

Omu ❤️`;

function next(){

document.getElementById("home").style.display="none";

document.getElementById("letter").style.display="flex";

type();

}

let i=0;

function type(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i);

i++;

setTimeout(type,35);

}

}

function song(){
  
setTimeout(()=>{

document.getElementById("letter").innerHTML+=`
<br><br>

<button onclick="showFinal()">

One Last Surprise ❤️

</button>

`;

},9000);

function showFinal(){

document.getElementById("letter").style.display="none";

document.getElementById("final").style.display="flex";

}
window.open("https://youtu.be/2mWaqsC3U7k","_blank");

}

setInterval(()=>{

let h=document.createElement("div");

h.innerHTML="❤";

h.className="heart";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(20+Math.random()*30)+"px";

document.body.appendChild(h);

setTimeout(()=>h.remove(),7000);

},300);

</script>

</body>
</html>
